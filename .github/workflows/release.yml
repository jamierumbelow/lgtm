name: Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get package version
        id: check
        run: |
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          echo "version=v${PACKAGE_VERSION}" >> $GITHUB_OUTPUT

          # Check if this tag already exists
          if git rev-parse "v${PACKAGE_VERSION}" >/dev/null 2>&1; then
            echo "Version v${PACKAGE_VERSION} already released"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version v${PACKAGE_VERSION} detected"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: lgtm-darwin-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Inject version info (stable)
        if: needs.check-version.outputs.should_release == 'true'
        shell: bash
        run: |
          cat > src/version.ts << 'VERSIONEOF'
          interface BuildInfo { version: string; isCanary: boolean; commitSha: string | null; buildDate: string | null; }
          VERSIONEOF
          echo "const buildInfo: BuildInfo = { version: \"${{ needs.check-version.outputs.version }}\", isCanary: false, commitSha: null, buildDate: \"${{ github.event.head_commit.timestamp }}\" };" >> src/version.ts
          cat >> src/version.ts << 'VERSIONEOF'
          export const VERSION = buildInfo.version;
          export const IS_CANARY = buildInfo.isCanary;
          export const COMMIT_SHA = buildInfo.commitSha;
          export const BUILD_DATE = buildInfo.buildDate;
          export const getVersionString = (): string => buildInfo.isCanary && buildInfo.commitSha ? `${buildInfo.version}-canary (${buildInfo.commitSha.slice(0, 7)})` : buildInfo.version;
          export const getBuildType = (): "canary" | "stable" => buildInfo.isCanary ? "canary" : "stable";
          VERSIONEOF

      - name: Inject version info (canary)
        if: needs.check-version.outputs.should_release != 'true'
        shell: bash
        run: |
          cat > src/version.ts << 'VERSIONEOF'
          interface BuildInfo { version: string; isCanary: boolean; commitSha: string | null; buildDate: string | null; }
          VERSIONEOF
          echo "const buildInfo: BuildInfo = { version: \"${{ needs.check-version.outputs.version }}\", isCanary: true, commitSha: \"${{ github.sha }}\", buildDate: \"${{ github.event.head_commit.timestamp }}\" };" >> src/version.ts
          cat >> src/version.ts << 'VERSIONEOF'
          export const VERSION = buildInfo.version;
          export const IS_CANARY = buildInfo.isCanary;
          export const COMMIT_SHA = buildInfo.commitSha;
          export const BUILD_DATE = buildInfo.buildDate;
          export const getVersionString = (): string => buildInfo.isCanary && buildInfo.commitSha ? `${buildInfo.version}-canary (${buildInfo.commitSha.slice(0, 7)})` : buildInfo.version;
          export const getBuildType = (): "canary" | "stable" => buildInfo.isCanary ? "canary" : "stable";
          VERSIONEOF

      - name: Build executable
        run: bun build ./src/cli.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: Release ${{ needs.check-version.outputs.version }}
          body: |
            ## Installation

            ### Quick Install (macOS/Linux)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/install.sh | bash
            ```

            ### Via npm
            ```bash
            npx @jamierumbelow/lgtm
            ```

            ### Manual Download
            Download the appropriate binary for your platform below and add it to your PATH.

            | Platform | Architecture | Download |
            |----------|-------------|----------|
            | macOS | Apple Silicon (M1/M2/M3) | `lgtm-darwin-arm64` |

          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Ensure latest npm
        run: npm install -g npm@latest

      - name: Get version
        id: version
        run: |
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          echo "npm_version=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT

      - name: Prepare platform package (darwin-arm64)
        run: |
          mkdir -p npm/darwin-arm64/bin
          cp artifacts/lgtm-darwin-arm64/lgtm-darwin-arm64 npm/darwin-arm64/bin/lgtm
          chmod +x npm/darwin-arm64/bin/lgtm
          cd npm/darwin-arm64
          npm version "${{ steps.version.outputs.npm_version }}" --no-git-tag-version

      - name: Publish platform package (darwin-arm64)
        run: npm publish --access public --provenance --ignore-scripts
        working-directory: npm/darwin-arm64

      - name: Update optionalDependencies version
        run: |
          VERSION="${{ steps.version.outputs.npm_version }}"
          jq --arg v "$VERSION" '.optionalDependencies["@jamierumbelow/lgtm-darwin-arm64"] = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Publish main package
        run: npm publish --access public --provenance --ignore-scripts

  canary:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare canary assets
        run: |
          mkdir -p canary
          find artifacts -type f -exec cp {} canary/ \;
          ls -la canary/

      - name: Delete existing canary release
        run: |
          gh release delete canary --yes || true
          git push origin :refs/tags/canary || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Canary Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: canary
          name: Canary Build
          body: |
            ## ⚠️ Canary Build

            **This is an automated build from the latest commit on master.**
            **It may be unstable. For production use, install a [stable release](https://github.com/${{ github.repository }}/releases/latest) instead.**

            ---

            **Commit:** ${{ github.sha }}
            **Built:** ${{ github.event.head_commit.timestamp }}

            ### Quick Install (macOS/Linux)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/install-canary.sh | bash
            ```

            ### Manual Download
            Download the appropriate binary for your platform below and add it to your PATH.

            | Platform | Architecture | Download |
            |----------|-------------|----------|
            | macOS | Apple Silicon (M1/M2/M3) | `lgtm-darwin-arm64` |

          files: canary/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Ensure latest npm
        run: npm install -g npm@latest

      - name: Set canary version
        id: canary_version
        run: |
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          CANARY_VERSION="${PACKAGE_VERSION}-canary.$(date +%Y%m%d%H%M%S).${SHORT_SHA}"
          echo "canary_version=${CANARY_VERSION}" >> $GITHUB_OUTPUT

      - name: Prepare platform package (darwin-arm64)
        run: |
          mkdir -p npm/darwin-arm64/bin
          cp artifacts/lgtm-darwin-arm64/lgtm-darwin-arm64 npm/darwin-arm64/bin/lgtm
          chmod +x npm/darwin-arm64/bin/lgtm
          cd npm/darwin-arm64
          npm version "${{ steps.canary_version.outputs.canary_version }}" --no-git-tag-version

      - name: Publish canary platform package (darwin-arm64)
        run: npm publish --access public --tag canary --provenance --ignore-scripts
        working-directory: npm/darwin-arm64

      - name: Update optionalDependencies and version for canary
        run: |
          CANARY="${{ steps.canary_version.outputs.canary_version }}"
          jq --arg v "$CANARY" '.optionalDependencies["@jamierumbelow/lgtm-darwin-arm64"] = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          npm version "$CANARY" --no-git-tag-version

      - name: Publish canary main package
        run: npm publish --access public --tag canary --provenance --ignore-scripts
